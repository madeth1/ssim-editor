name: Build

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

# tauri-action creates the draft release and uploads installers to it
permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest # Apple Silicon .app/.dmg
            args: ""
            rust-target: ""
          - platform: windows-latest # x64 .exe/.msi
            args: ""
            rust-target: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: dtolnay/rust-toolchain@stable

      - name: Add cross-compile target
        if: matrix.rust-target != ''
        run: rustup target add ${{ matrix.rust-target }}

      - run: npm ci

      - run: npm test

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          args: ${{ matrix.args }}
          # on tag pushes, attach installers to a draft GitHub release
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
          releaseName: ${{ startsWith(github.ref, 'refs/tags/') && format('SSIM Editor {0}', github.ref_name) || '' }}
          releaseDraft: true

      # manual runs create no release; keep the installers as workflow artifacts
      - uses: actions/upload-artifact@v4
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        with:
          name: installers-${{ matrix.platform }}${{ matrix.rust-target && format('-{0}', matrix.rust-target) || '' }}
          path: |
            src-tauri/target/**/release/bundle/dmg/*.dmg
            src-tauri/target/**/release/bundle/nsis/*.exe
          if-no-files-found: error
